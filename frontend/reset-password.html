<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AssignTrack — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a1a;--accent:#7c6fff;--text:#f0eeff;--muted:#8884aa;--border:rgba(255,255,255,0.1);--error:#ff6b6b;--green:#00e5a0}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .card{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(20px);padding:2rem;width:100%;max-width:420px}
    h2{font-size:1.3rem;margin-bottom:.3rem;background:linear-gradient(135deg,#7c6fff,#ff6fb0);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
    p.sub{font-size:.82rem;color:var(--muted);margin-bottom:1.3rem}
    .label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;margin-top:.9rem}
    .input{width:100%;padding:.6rem .9rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.85rem;outline:none}
    .input:focus{border-color:var(--accent)}
    .btn{width:100%;padding:.7rem;background:linear-gradient(135deg,var(--accent),#9b8fff);border:none;border-radius:10px;color:white;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:1.2rem}
    .msg{font-size:.8rem;padding:.5rem .8rem;border-radius:8px;margin-top:.8rem;display:none}
    .msg.error{background:rgba(255,107,107,.12);color:var(--error);border:1px solid rgba(255,107,107,.25)}
    .msg.success{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.25)}
    .msg.show{display:block}
    a{color:var(--accent);font-size:.8rem}
  </style>
</head>
<body>
<div class="card">
  <h2>🔑 Reset Password</h2>
  <p class="sub">Enter a new password for your account.</p>
  <label class="label">New Password</label>
  <input class="input" id="password" type="password" placeholder="At least 6 characters"/>
  <label class="label">Confirm Password</label>
  <input class="input" id="confirmPassword" type="password" placeholder="Re-enter password"/>
  <button class="btn" onclick="handleReset()">Reset Password →</button>
  <div class="msg" id="msg"></div>
  <p style="margin-top:1rem;text-align:center"><a href="/login.html">← Back to Login</a></p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  async function handleReset() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    if (!token) { showMsg("Invalid or missing reset link.", "error"); return; }
    if (!password || password.length < 6) { showMsg("Password must be at least 6 characters.", "error"); return; }
    if (password !== confirmPassword) { showMsg("Passwords do not match.", "error"); return; }
    const res = await fetch("/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error, "error"); return; }
    showMsg("Password reset! Redirecting to login...", "success");
    setTimeout(() => window.location.href = "/login.html", 1500);
  }
  function showMsg(t, type) {
    const el = document.getElementById("msg");
    el.textContent = t;
    el.className = `msg ${type} show`;
  }
</script>
</body>
</html>
